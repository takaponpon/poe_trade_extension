<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PoE2 Trade Extension Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1 class="popup-title">POE2 TRADE</h1>
      <p class="popup-subtitle">Sidebar Overlay</p>
    </header>
    
    <main class="popup-content">
      <p class="info-text">
        この拡張機能は、Path of Exile 2の取引サイト（公式トレードページ）の右側に高機能なサイドバーを直接追加します。
      </p>
      
      <div class="quick-links">
        <a href="https://jp.pathofexile.com/trade2/search/poe2" target="_blank" class="btn-link">
          日本語版トレードサイトを開く
        </a>
        <a href="https://www.pathofexile.com/trade2/search/poe2" target="_blank" class="btn-link secondary">
          英語版トレードサイトを開く
        </a>
      </div>
    </main>
    
    <footer class="popup-footer">
      <span>PoE2 Trade Extension v1.0.0</span>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
